# ============================================================
# Waselak Backend — Docker Compose (VPS)
# ============================================================
# Single source of truth: env/backend-release.env
#
# Usage:
#   Production:  docker compose -f docker-compose.prod.yml up -d
#   Staging:     docker compose -f docker-compose.staging.yml up -d
# ============================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: waselak-postgres-prod
    env_file: ../env/backend-release.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-waselak_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: waselak-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../env/backend-release.env
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_prod_data:
