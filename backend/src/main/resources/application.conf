ktor {
    deployment {
        host = "0.0.0.0"
        host = ${?HOST}
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ net.marllex.waselak.backend.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/waselak_db"
    url = ${?DATABASE_URL}
    user = "waselak_db"
    user = ${?DATABASE_USER}
    password = "waselak_db_dev"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

hmac {
    secret = "w4s3l4k-hmac-s3cr3t-k3y-ch4ng3-1n-pr0duct10n"
    secret = ${?HMAC_SECRET}
    timestampToleranceMs = 300000
}

jwt {
    secret = "dev-secret-key-change-in-production-12345"
    secret = ${?JWT_SECRET}
    issuer = "waselak"
    issuer = ${?JWT_ISSUER}
    audience = "waselak-api"
    audience = ${?JWT_AUDIENCE}
    realm = "Waselak API"
    accessTokenExpireMs = 900000
    refreshTokenExpireDays = 7
}
