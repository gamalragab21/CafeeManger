# ============================================================
# Waselak Backend — Development Configuration (default)
# ============================================================
# This config provides safe dev defaults so the backend starts
# locally without any environment variables.
# For production, use application-prod.conf which overrides
# secrets with required env vars.
# ============================================================

ktor {
    deployment {
        host = "0.0.0.0"
        host = ${?HOST}
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ net.marllex.waselak.backend.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/waselak_db"
    url = ${?DATABASE_URL}
    user = "waselak_db"
    user = ${?DATABASE_USER}
    password = "waselak_db_dev"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
    seedDemoData = true
    seedDemoData = ${?SEED_DEMO_DATA}
}

hmac {
    secret = "0003e100bafedf7a06d298c612cce6560bfd29dfad656d23303b7b0f05ac4ab2"
    secret = ${?HMAC_SECRET}
    timestampToleranceMs = 300000
}

logging {
    retentionDays = 30
    retentionDays = ${?LOG_RETENTION_DAYS}
    maxBodyLogSize = 10240
    maxBodyLogSize = ${?LOG_MAX_BODY_SIZE}
}

jwt {
    secret = "ec1e287139629ae6a79ea83377d045b777d4444e645bf9a78c5903f87cf0b28f"
    secret = ${?JWT_SECRET}
    issuer = "waselak"
    issuer = ${?JWT_ISSUER}
    audience = "waselak-api"
    audience = ${?JWT_AUDIENCE}
    realm = "Waselak API"
    accessTokenExpireMs = 900000
    refreshTokenExpireDays = 7
}

admin-jwt {
    secret = "c629b29f1ada461af9507f2ac8ecae3275263730acd28b8303d358d5b4b16ef7"
    secret = ${?ADMIN_JWT_SECRET}
    issuer = "waselak-admin"
    issuer = ${?ADMIN_JWT_ISSUER}
    audience = "waselak-admin-dashboard"
    audience = ${?ADMIN_JWT_AUDIENCE}
    expireMs = 86400000
    expireMs = ${?ADMIN_JWT_EXPIRE_MS}
    refreshExpireDays = 30
    refreshExpireDays = ${?ADMIN_JWT_REFRESH_EXPIRE_DAYS}
}

admin {
    name = "Gamal Ragab"
    name = ${?ADMIN_NAME}
    email = "gamalragab217@gmail.com"
    email = ${?ADMIN_EMAIL}
    password = "123456"
    password = ${?ADMIN_PASSWORD}
}

sentry {
    dsn = "https://0dbf8a87fc27547d8546a9ba65761cee@o4510973812015104.ingest.de.sentry.io/4511000890572880"
    dsn = ${?SENTRY_DSN}
    environment = "development"
    environment = ${?SENTRY_ENV}
