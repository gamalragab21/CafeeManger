# ============================================================
# Waselak Backend — Configuration
# ============================================================
# ALL values come from environment variables.
# Single source of truth: env/backend-debug.env (dev)
#                         env/backend-release.env (prod)
#
# Run locally:  ./gradlew :backend:run (loads backend-debug.env)
# Run on VPS:   docker compose up (loads backend-release.env)
# ============================================================

ktor {
    deployment {
        host = ${HOST}
        port = ${PORT}
    }
    application {
        modules = [ net.marllex.waselak.backend.ApplicationKt.module ]
    }
}

database {
    url = ${DATABASE_URL}
    user = ${DATABASE_USER}
    password = ${DATABASE_PASSWORD}
    maxPoolSize = 10
    seedDemoData = ${SEED_DEMO_DATA}
}

hmac {
    secret = ${HMAC_SECRET}
    # 30 minutes (was 5 min). Mobile devices auto-sync time via cellular NTP
    # every few minutes so 5 min was sufficient there, but desktop machines
    # (especially macOS without "Set time and date automatically") can drift
    # by 10-15 min before any user notices. Multiple merchants have hit
    #   {"error":"Request expired"}
    # on the desktop Cashier app for this reason. Widening to 30 min keeps
    # replay-attack protection meaningful (the nonce check is the real guard
    # against replay anyway — see HmacVerification's usedNonces map) while
    # eliminating the false-rejection surface for desktop clients.
    timestampToleranceMs = 1800000
}

logging {
    retentionDays = ${LOG_RETENTION_DAYS}
    maxBodyLogSize = 10240
}

jwt {
    secret = ${JWT_SECRET}
    issuer = ${JWT_ISSUER}
    audience = ${JWT_AUDIENCE}
    realm = "Waselak API"
    accessTokenExpireMs = 900000
    refreshTokenExpireDays = 7
}

admin-jwt {
    secret = ${ADMIN_JWT_SECRET}
    issuer = "waselak-admin"
    audience = "waselak-admin-dashboard"
    expireMs = 86400000
    refreshExpireDays = 30
}

admin {
    name = ${ADMIN_NAME}
    email = ${ADMIN_EMAIL}
    password = ${ADMIN_PASSWORD}
}

sentry {
    dsn = ${SENTRY_DSN}
    environment = ${SENTRY_ENV}
}
