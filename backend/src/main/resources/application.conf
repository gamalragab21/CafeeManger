ktor {
    deployment {
        host = "0.0.0.0"
        host = ${?HOST}
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ net.marllex.waselak.backend.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/waselak_db"
    url = ${?DATABASE_URL}
    user = "waselak_db"
    user = ${?DATABASE_USER}
    password = "waselak_db_dev"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

hmac {
    secret = ${HMAC_SECRET}
    timestampToleranceMs = 300000
}

logging {
    retentionDays = 30
    retentionDays = ${?LOG_RETENTION_DAYS}
    maxBodyLogSize = 10240
    maxBodyLogSize = ${?LOG_MAX_BODY_SIZE}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "waselak"
    issuer = ${?JWT_ISSUER}
    audience = "waselak-api"
    audience = ${?JWT_AUDIENCE}
    realm = "Waselak API"
    accessTokenExpireMs = 900000
    refreshTokenExpireDays = 7
}

admin-jwt {
    secret = ${ADMIN_JWT_SECRET}
    issuer = "waselak-admin"
    issuer = ${?ADMIN_JWT_ISSUER}
    audience = "waselak-admin-dashboard"
    audience = ${?ADMIN_JWT_AUDIENCE}
    expireMs = 3600000
    expireMs = ${?ADMIN_JWT_EXPIRE_MS}
    refreshExpireDays = 30
    refreshExpireDays = ${?ADMIN_JWT_REFRESH_EXPIRE_DAYS}
}

admin {
    name = ${ADMIN_NAME}
    email = ${ADMIN_EMAIL}
    password = ${ADMIN_PASSWORD}
}
