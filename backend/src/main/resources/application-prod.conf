# ============================================================
# Waselak Backend — Production Configuration
# ============================================================
# This config includes the base application.conf and overrides
# secrets with REQUIRED environment variables.
# Start with: ./run-prod.sh (which loads .env.prod)
# ============================================================

include "application.conf"

# Override dev defaults with required production env vars
hmac {
    secret = ${HMAC_SECRET}
}

jwt {
    secret = ${JWT_SECRET}
}

admin-jwt {
    secret = ${ADMIN_JWT_SECRET}
}

admin {
    name = ${ADMIN_NAME}
    email = ${ADMIN_EMAIL}
    password = ${ADMIN_PASSWORD}
}

database {
    seedDemoData = false
    seedDemoData = ${?SEED_DEMO_DATA}
}
