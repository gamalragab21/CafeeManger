version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: waselak-postgres
    environment:
      POSTGRES_USER: waselak_db
      POSTGRES_PASSWORD: waselak_db_dev
      POSTGRES_DB: waselak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waselak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: waselak-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/waselak_db
      DATABASE_USER: waselak_db
      DATABASE_PASSWORD: waselak_db_dev
      # HMAC_SECRET must match env/debug.properties in mobile apps
      HMAC_SECRET: 0003e100bafedf7a06d298c612cce6560bfd29dfad656d23303b7b0f05ac4ab2
      JWT_SECRET: ec1e287139629ae6a79ea83377d045b777d4444e645bf9a78c5903f87cf0b28f
      JWT_ISSUER: waselak
      JWT_AUDIENCE: waselak-api
      ADMIN_JWT_SECRET: c629b29f1ada461af9507f2ac8ecae3275263730acd28b8303d358d5b4b16ef7
      ADMIN_NAME: Gamal Ragab
      ADMIN_EMAIL: gamalragab217@gmail.com
      ADMIN_PASSWORD: "123456"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
