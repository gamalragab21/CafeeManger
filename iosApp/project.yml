name: Waselak
options:
  bundleIdPrefix: net.marllex.waselak
  # Bumped from 16.0 → 17.0 because the Kotlin framework (via the Compose
  # Multiplatform 1.8.0 runtime) auto-links SwiftUICore.tbd which Apple
  # gates behind iOS 17. With deployment-target 16.0 the linker rejected it
  # ("product being built is not an allowed client of it").
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Apple Developer team for automatic code-signing on physical devices.
    # Without this, every fresh xcodegen output errors with
    #   "Signing for 'WaselakManager' requires a development team."
    # because xcodegen doesn't carry over the team selection that Xcode
    # otherwise stashes in xcuserdata. 263CJ2VCYS = personal team for
    # gamalragab21@icloud.com — the same team the prior successful device
    # build used. To switch teams, change this value AND swap the cert in
    # `security find-identity -v -p codesigning`.
    DEVELOPMENT_TEAM: "263CJ2VCYS"
    CODE_SIGN_STYLE: Automatic

# Sentry-Cocoa (Swift Package). Sentry KMP's iOS layer auto-links to the
# `Sentry` and `UIUtilities` frameworks at compile time; without the SPM
# dependency declared here the linker fails with "framework 'Sentry' not
# found". Pinned at 8.x — Sentry KMP 0.13+ is built against 8.x.
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  # Manager — installs as TWO distinct apps so debug + release can coexist on
  # the same iPhone:
  #   • Debug   bundle id: net.marllex.waselak.manager.debug   → backend 8081
  #   • Release bundle id: net.marllex.waselak.manager         → backend 8080
  # Each configuration triggers the matching Gradle linkXxxFrameworkIosArm64
  # task with -PBUILD_ENV={debug|release} so BuildConfig.BASE_URL bakes in
  # the right URL.
  WaselakManager:
    type: application
    platform: iOS
    sources:
      - Manager
    info:
      path: Manager/Info.plist
      # xcodegen owns this plist — every `xcodegen generate` rewrites the
      # file from this spec and drops anything not listed here. Hand-editing
      # Manager/Info.plist is a trap (it'll silently revert on the next
      # regen, which is exactly how PlistSanityCheck started crashing the
      # app at launch). Declare CMP-required keys here instead.
      properties:
        # Compose Multiplatform aborts at startup unless this is true.
        # Without it: "Info.plist doesn't have a valid
        # CADisableMinimumFrameDurationOnPhone entry" → SIGABRT.
        CADisableMinimumFrameDurationOnPhone: true
        # Empty UILaunchScreen dict = "use the blank default launch
        # surface". Avoids needing a launch storyboard asset.
        UILaunchScreen: {}
        # Modern UIScene lifecycle. CMP's ComposeUIViewController
        # integrates with the scene-based path; without this manifest
        # some CMP versions fall back to legacy app-delegate and lose
        # touch input on the simulator.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # ATS is now satisfied by HTTPS endpoints — api.waselak.online and
        # debug.waselak.online both serve over TLS (Let's Encrypt). The
        # blanket NSAllowsArbitraryLoads is kept as a safety net for
        # ad-hoc dev builds that point at a local backend (LAN IP), and
        # so prod doesn't refuse to launch if we ever swap a host that
        # hasn't been onboarded to HTTPS yet. Once we're certain every
        # client config is on HTTPS, this whole block can be deleted.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Face ID usage description. iOS REQUIRES this key when the app
        # links LocalAuthentication.framework and calls LAContext's
        # `evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics)` with
        # Face ID. Missing → the OS terminates the process with
        # `__abort_with_payload` the moment LAContext is invoked (no
        # crash log, just a hard kill on the FaceID code path). Required
        # for the post-login biometric gate. Touch ID does NOT need a
        # separate key — `NSFaceIDUsageDescription` covers both because
        # iOS only enforces the privacy prompt for Face ID. The string
        # is shown verbatim in the system dialog.
        NSFaceIDUsageDescription: "Authenticate to unlock the Manager Panel."
    dependencies:
      - package: Sentry
    settings:
      base:
        # -ObjC: keep Obj-C class metadata that the Kotlin framework relies on.
        # -lsqlite3: link iOS' system SQLite. SqlDelight's iOS native driver
        #            (co.touchlab.sqliter) calls into sqlite3_* and won't
        #            link without it.
        # The setting name matters: Xcode reads OTHER_LDFLAGS, not the
        # OTHER_LINKER_FLAGS alias xcodegen used to emit. With the alias,
        # the flags reached the project file but were silently ignored by
        # the dylib-link sub-step in debug builds, leaving sqlite3 unresolved.
        OTHER_LDFLAGS: "-ObjC -lsqlite3"
        SUPPORTS_MACCATALYST: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: net.marllex.waselak.manager.debug
          PRODUCT_NAME: "Waselak Manager Debug"
          # SDK-conditional paths so the linker pulls the matching klib:
          #   iphoneos*       → iosArm64/debugFramework  (real device)
          #   iphonesimulator → iosSimulatorArm64/debugFramework
          # Without this both paths were searched in order and the device
          # build picked the simulator framework first, hitting:
          #   "Building for 'iOS', but linking in object file built for 'iOS-simulator'"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(SRCROOT)/../app-manager/build/bin/iosArm64/debugFramework"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(SRCROOT)/../app-manager/build/bin/iosSimulatorArm64/debugFramework"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: net.marllex.waselak.manager
          PRODUCT_NAME: "Waselak Manager"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(SRCROOT)/../app-manager/build/bin/iosArm64/releaseFramework"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(SRCROOT)/../app-manager/build/bin/iosSimulatorArm64/releaseFramework"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        # Run in a login shell so PATH includes /usr/local/bin, /opt/homebrew/bin
        # etc. — Xcode's default build-script environment is intentionally
        # minimal (no PATH, no JAVA_HOME). Without this, the gradle wrapper
        # exits 127 ("command not found") for `java`, and the only thing in
        # the build log is "Command PhaseScriptExecution failed with a
        # nonzero exit code" — which is what we kept hitting.
        shell: /bin/bash -l
        script: |
          set -e
          set -x  # echo each command into the build log so a failure is debuggable

          # Pin to JDK 17. The system default (`/usr/libexec/java_home`)
          # currently resolves to OpenJDK 25.0.1, which Kotlin Gradle Plugin
          # 2.1.20 + AGP 8.9.1 don't recognise — gradle aborts with the cryptic
          # `* What went wrong: 25.0.1` and the Xcode build phase crashes with
          # "Command PhaseScriptExecution failed with a nonzero exit code".
          # Switching to 17 (any flavour — Corretto / Temurin / Homebrew) keeps
          # us aligned with the toolchain Android already uses.
          export JAVA_HOME="$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home -v 21 2>/dev/null)"
          if [ -z "$JAVA_HOME" ]; then
            echo "❌ No JDK 17 or 21 installed. brew install openjdk@21 or download Corretto 17." >&2
            exit 1
          fi
          export PATH="$JAVA_HOME/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          echo "Using JAVA_HOME=$JAVA_HOME"

          cd "$SRCROOT/.."

          # `embedAndSignAppleFrameworkForXcode` is Compose Multiplatform's
          # official Xcode-integration task. It reads $CONFIGURATION, $SDK_NAME,
          # $ARCHS, $BUILT_PRODUCTS_DIR, $TARGET_BUILD_DIR, $FRAMEWORKS_FOLDER_PATH
          # from Xcode's env, and on a single invocation:
          #   1. Builds the right framework variant (linkDebug/Release × IosArm64/IosSimulatorArm64)
          #   2. Embeds the framework into the .app
          #   3. **Syncs `compose-resources/` into the .app bundle** ← this was the missing piece
          #   4. Code-signs
          #
          # Without (3), Compose's stringResource() crashes at first frame with
          #   org.jetbrains.compose.resources.MissingResourceException:
          #     Missing resource with path: <App>.app/compose-resources/composeResources/<module>/values/strings.commonMain.cvr
          # because the .cvr files generated under
          #   <module>/build/generated/compose/resourceGenerator/preparedResources/...
          # never made it into the bundle. The previous script invoked only
          # `linkDebugFramework${ARCH}` which produces the framework but not
          # the resource tree the runtime expects.
          BUILD_ENV=$([ "$CONFIGURATION" = "Release" ] && echo release || echo debug)
          ./gradlew :app-manager:embedAndSignAppleFrameworkForXcode \
            -PBUILD_ENV=$BUILD_ENV \
            --no-daemon
        basedOnDependencyAnalysis: false

  WaselakCashier:
    type: application
    platform: iOS
    sources:
      - Cashier
    info:
      path: Cashier/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.marllex.waselak.cashier
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../app-cashier/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../app-cashier/build/bin/iosArm64/releaseFramework"
        OTHER_LINKER_FLAGS: "-ObjC"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :app-cashier:linkDebugFrameworkIos${NATIVE_ARCH_ACTUAL:+SimulatorArm64}
        basedOnDependencyAnalysis: false

  WaselakDelivery:
    type: application
    platform: iOS
    sources:
      - Delivery
    info:
      path: Delivery/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.marllex.waselak.delivery
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../app-delivery/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../app-delivery/build/bin/iosArm64/releaseFramework"
        OTHER_LINKER_FLAGS: "-ObjC"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :app-delivery:linkDebugFrameworkIos${NATIVE_ARCH_ACTUAL:+SimulatorArm64}
        basedOnDependencyAnalysis: false
