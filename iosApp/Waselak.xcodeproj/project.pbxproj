			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = "/bin/bash -l";
			shellScript = "set -e\nset -x  # echo each command into the build log so a failure is debuggable\n\n# Pin to JDK 17. The system default (`/usr/libexec/java_home`)\n# currently resolves to OpenJDK 25.0.1, which Kotlin Gradle Plugin\n# 2.1.20 + AGP 8.9.1 don't recognise — gradle aborts with the cryptic\n# `* What went wrong: 25.0.1` and the Xcode build phase crashes with\n# \"Command PhaseScriptExecution failed with a nonzero exit code\".\n# Switching to 17 (any flavour — Corretto / Temurin / Homebrew) keeps\n# us aligned with the toolchain Android already uses.\nexport JAVA_HOME=\"$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home -v 21 2>/dev/null)\"\nif [ -z \"$JAVA_HOME\" ]; then\n  echo \"❌ No JDK 17 or 21 installed. brew install openjdk@21 or download Corretto 17.\" >&2\n  exit 1\nfi\nexport PATH=\"$JAVA_HOME/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH\"\necho \"Using JAVA_HOME=$JAVA_HOME\"\n\ncd \"$SRCROOT/..\"\n\n# `embedAndSignAppleFrameworkForXcode` is Compose Multiplatform's\n# official Xcode-integration task. It reads $CONFIGURATION, $SDK_NAME,\n# $ARCHS, $BUILT_PRODUCTS_DIR, $TARGET_BUILD_DIR, $FRAMEWORKS_FOLDER_PATH\n# from Xcode's env, and on a single invocation:\n#   1. Builds the right framework variant (linkDebug/Release × IosArm64/IosSimulatorArm64)\n#   2. Embeds the framework into the .app\n#   3. **Syncs `compose-resources/` into the .app bundle** ← this was the missing piece\n#   4. Code-signs\n#\n# Without (3), Compose's stringResource() crashes at first frame with\n#   org.jetbrains.compose.resources.MissingResourceException:\n#     Missing resource with path: <App>.app/compose-resources/composeResources/<module>/values/strings.commonMain.cvr\n# because the .cvr files generated under\n#   <module>/build/generated/compose/resourceGenerator/preparedResources/...\n# never made it into the bundle. The previous script invoked only\n# `linkDebugFramework${ARCH}` which produces the framework but not\n# the resource tree the runtime expects.\nBUILD_ENV=$([ \"$CONFIGURATION\" = \"Release\" ] && echo release || echo debug)\n./gradlew :app-manager:embedAndSignAppleFrameworkForXcode \\\n  -PBUILD_ENV=$BUILD_ENV \\\n  --no-daemon\n";
		};
