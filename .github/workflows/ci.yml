# =============================================================================
# Waselak CI/CD Pipeline
# =============================================================================
# 1. Lint      — Android lint on all 5 apps
# 2. Test      — Backend (48) + KMP (28+) unit tests
# 3. Android   — Debug + Release APKs for manager, cashier, delivery, kds, admin
# 4. Desktop   — Linux .deb, macOS .dmg, Windows .msi (matrix)
# 5. Release   — GitHub Release + Telegram notification
#
# Naming: {app}-v{version}-{DDMMYY}-{debug|release}-{platform}.{ext}
# Example: manager-v1.0.0-110326-release-android.apk
# =============================================================================

name: Waselak CI/CD

on:
  push:
    tags: ['v*']
#  pull_request:
#    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Skip GitHub Release + Telegram"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.parallel=true"

# =============================================================================
# JOB 1: LINT
# =============================================================================
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run Android Lint
        run: |
          ./gradlew :app-manager:lintDebug \
                    :app-cashier:lintDebug \
                    :app-delivery:lintDebug \
                    :app-kds:lintDebug \
                    :app-admin:lintDebug \
                    --continue

      - name: Upload lint reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app-manager/build/reports/lint-results-debug.html
            app-cashier/build/reports/lint-results-debug.html
            app-delivery/build/reports/lint-results-debug.html
            app-kds/build/reports/lint-results-debug.html
            app-admin/build/reports/lint-results-debug.html
          retention-days: 3

  # ===========================================================================
  # JOB 2: TEST
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run backend tests
        run: ./gradlew :backend:test

      - name: Run KMP unit tests
        run: |
          ./gradlew :core:core-model:desktopTest \
                    :feature:feature-manager-orders:desktopTest \
                    --continue

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/build/reports/tests/
            core/core-model/build/reports/tests/
            feature/feature-manager-orders/build/reports/tests/
          retention-days: 3

  # ===========================================================================
  # JOB 3: BUILD ANDROID (debug + release APKs)
  # ===========================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # ── Reconstruct release secrets from GitHub Secrets ──────────────────
      - name: Create env/release.properties
        env:
          R_BASE_URL: ${{ secrets.RELEASE_BASE_URL }}
          R_HMAC: ${{ secrets.RELEASE_HMAC_SECRET }}
          R_SENTRY: ${{ secrets.RELEASE_SENTRY_DSN }}
        run: |
          printf "BASE_URL=%s\nHMAC_SECRET=%s\nSENTRY_DSN=%s\n" "$R_BASE_URL" "$R_HMAC" "$R_SENTRY" > env/release.properties
          echo "=== Release Config Verification ==="
          echo "BASE_URL: ${R_BASE_URL:0:6}...${R_BASE_URL: -6}"
          echo "HMAC:     ${R_HMAC:0:6}...${R_HMAC: -6}"
          echo "SENTRY:   ${R_SENTRY:0:6}...${R_SENTRY: -6}"

      # ── Build APKs ──────────────────────────────────────────────────────
      # Keystore is handled by Gradle: it reads KEYSTORE_BASE64 env var,
      # decodes it to a .jks file, and configures signing automatically.
      # Both debug AND release builds need the keystore — without it,
      # debug APKs would be signed with Android's auto-generated default
      # debug.keystore (different per CI run), so any user trying to
      # update from one CI debug build to a later CI debug build would
      # hit "package conflict, signatures don't match".
      - name: Build all debug APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleAllDebug

      - name: Build all release APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleAllRelease

      # ── Compute naming variables ────────────────────────────────────────
      - name: Compute version and date
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Rename and organize APKs ────────────────────────────────────────
      - name: Rename APKs to naming convention
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          mkdir -p artifacts/debug artifacts/release

          for module in app-manager app-cashier app-delivery app-kds app-admin; do
            name="${module#app-}"

            # Debug APK
            DEBUG_APK=$(find "$module/build/outputs/apk/debug" \
                             -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" \
                 "artifacts/debug/${name}-v${VERSION}-${DATE}-debug-android.apk"
              echo "OK: ${name} debug APK"
            else
              echo "WARNING: No debug APK found for $module"
            fi

            # Release APK
            RELEASE_APK=$(find "$module/build/outputs/apk/release" \
                               -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$RELEASE_APK" ]; then
              cp "$RELEASE_APK" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-android.apk"
              echo "OK: ${name} release APK"
            else
              echo "WARNING: No release APK found for $module"
            fi
          done

          echo "=== Debug artifacts ==="
          ls -la artifacts/debug/
          echo "=== Release artifacts ==="
          ls -la artifacts/release/ 2>/dev/null || echo "(none)"

      # ── Upload as GitHub artifacts ──────────────────────────────────────
      - name: Upload debug APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: artifacts/debug/
          retention-days: 3

      - name: Upload release APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 4: BUILD BACKEND JAR
  # ===========================================================================
  build-backend:
    name: Build Backend JAR
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Fat JAR
        run: ./gradlew :backend:buildFatJar

      - name: Rename JAR
        run: |
          mkdir -p artifacts
          cp backend/build/libs/*-all.jar artifacts/waselak-backend.jar
          ls -lh artifacts/

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: artifacts/waselak-backend.jar
          retention-days: 3

  # ===========================================================================
  # JOB 5: BUILD DESKTOP (matrix: Linux, macOS, Windows)
  # ===========================================================================
  build-desktop:
    name: Build Desktop (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            task: packageAllDesktopDeb
            gradle-args: ""
            platform: linux
            ext: deb
            java-version: "21"

          - os: macos-14
            os-label: macOS (ARM64)
            task: packageAllDesktopDmg
            gradle-args: ""
            platform: macos
            ext: dmg
            java-version: "21"

          - os: windows-latest
            os-label: Windows
            task: packageAllDesktopMsi
            gradle-args: ""
            platform: windows
            ext: msi
            java-version: "21"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version || env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # Desktop packaging tasks auto-detect as release via
      # KmpApplicationConventionPlugin.resolveBuildEnv()
      - name: Create env/release.properties
        shell: bash
        env:
          R_BASE_URL: ${{ secrets.RELEASE_BASE_URL }}
          R_HMAC: ${{ secrets.RELEASE_HMAC_SECRET }}
          R_SENTRY: ${{ secrets.RELEASE_SENTRY_DSN }}
        run: |
          printf "BASE_URL=%s\nHMAC_SECRET=%s\nSENTRY_DSN=%s\n" "$R_BASE_URL" "$R_HMAC" "$R_SENTRY" > env/release.properties
          echo "=== Desktop Release Config Verification ==="
          echo "BASE_URL: ${R_BASE_URL:0:6}...${R_BASE_URL: -6}"
          echo "HMAC:     ${R_HMAC:0:6}...${R_HMAC: -6}"
          echo "SENTRY:   ${R_SENTRY:0:6}...${R_SENTRY: -6}"

      - name: Compute version and date
        id: vars
        shell: bash
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Debug desktop build ──
      - name: Build debug desktop packages
        shell: bash
        run: ./gradlew ${{ matrix.task }} -PBUILD_ENV=debug

      - name: Collect debug desktop packages
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          PLATFORM="${{ matrix.platform }}"
          EXT="${{ matrix.ext }}"
          mkdir -p artifacts/debug

          for module in app-manager app-cashier app-delivery app-kds; do
            name="${module#app-}"
            PKG=$(find "$module/build/compose/binaries" \
                       -name "*.$EXT" -type f 2>/dev/null | head -1)
            if [ -n "$PKG" ]; then
              cp "$PKG" \
                 "artifacts/debug/${name}-v${VERSION}-${DATE}-debug-${PLATFORM}.${EXT}"
              echo "OK: ${name}-v${VERSION}-${DATE}-debug-${PLATFORM}.${EXT}"
            else
              echo "WARNING: No debug .$EXT for $module"
            fi
          done
          echo "=== Debug desktop artifacts ($PLATFORM) ==="
          ls -la artifacts/debug/

      # ── Clean before release build ──
      - name: Clean build for release
        shell: bash
        run: ./gradlew clean

      # ── Release desktop build ──
      - name: Build release desktop packages
        shell: bash
        run: ./gradlew ${{ matrix.task }} ${{ matrix.gradle-args }}

      - name: Collect release desktop packages
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          PLATFORM="${{ matrix.platform }}"
          EXT="${{ matrix.ext }}"
          mkdir -p artifacts/release

          for module in app-manager app-cashier app-delivery app-kds; do
            name="${module#app-}"
            PKG=$(find "$module/build/compose/binaries/main/$EXT" \
                       -name "*.$EXT" -type f 2>/dev/null | head -1)
            if [ -n "$PKG" ]; then
              cp "$PKG" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
              echo "OK: ${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
            else
              echo "WARNING: No release .$EXT for $module"
            fi
          done
          echo "=== Release desktop artifacts ($PLATFORM) ==="
          ls -la artifacts/release/

      - name: Upload debug desktop artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: desktop-debug-${{ matrix.platform }}
          path: artifacts/debug/
          retention-days: 3

      - name: Upload release desktop artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 5: UPLOAD TO GOOGLE DRIVE
  # ===========================================================================
  # upload-to-dropbox: (disabled — replaced by GitHub Releases + Telegram)
  #   To re-enable, uncomment this block and comment out the release job below.

  release-and-notify:
    name: GitHub Release + Telegram + Deploy
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop, build-backend]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event.inputs.skip_upload != 'true')
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout (for gradle.properties)
        uses: actions/checkout@v4
        with:
          sparse-checkout: gradle.properties

      # ── Download all artifacts ──────────────────────────────────────────
      - name: Download Android debug
        uses: actions/download-artifact@v4
        with:
          name: android-debug
          path: all-artifacts/debug/

      - name: Download Android release
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: all-artifacts/release/

      - name: Download Linux desktop debug
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: desktop-debug-linux
          path: all-artifacts/debug/

      - name: Download macOS desktop debug
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: desktop-debug-macos
          path: all-artifacts/debug/

      - name: Download Windows desktop debug
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: desktop-debug-windows
          path: all-artifacts/debug/

      - name: Download Linux desktop release
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-linux
          path: all-artifacts/release/

      - name: Download macOS desktop release
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-macos
          path: all-artifacts/release/

      - name: Download Windows desktop release
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-windows
          path: all-artifacts/release/

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: all-artifacts/release/

      - name: Show all artifacts
        run: |
          echo "=== Debug ==="
          ls -lh all-artifacts/debug/
          echo "=== Release ==="
          ls -lh all-artifacts/release/

      # ── Read version ────────────────────────────────────────────────────
      - name: Read version
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION_CODE=$(grep 'APP_VERSION_CODE' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          DATE=$(date -u '+%Y-%m-%d')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.vars.outputs.version }}
          VERSION_CODE: ${{ steps.vars.outputs.version_code }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create release with all files. The "VERSION_CODE=N" marker is
          # what the backend's GithubReleaseService parser extracts to
          # compare against the running app — without it the backend
          # falls back to a synthetic version_code derived from the
          # semver, which never matches the real build number.
          NOTES="Waselak v${VERSION} (VERSION_CODE=${VERSION_CODE}) - Android APKs (debug+release), Desktop (Linux/macOS/Windows), Backend JAR. Built by CI/CD ${DATE}"
          gh release create "$TAG" \
            --title "Waselak v${VERSION}" \
            --notes "$NOTES" \
            --latest \
            all-artifacts/debug/* \
            all-artifacts/release/*

          echo "✅ GitHub Release created: $TAG"

      # ── Notify backend (push-based release publish) ─────────────────────
      # The backend's GithubReleaseService caches the latest release from
      # the GitHub API. We poll daily as a fallback, but the fastest way
      # for users to see "Update available" after a tag push is for THIS
      # workflow to call the backend's /release-published endpoint as
      # soon as the GitHub Release exists. Backend then refreshes its
      # cache within seconds. Token validation guards against random
      # internet traffic hitting this endpoint.
      - name: Notify backend of new release
        env:
          BACKEND_PUSH_TOKEN: ${{ secrets.BACKEND_PUSH_TOKEN }}
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$BACKEND_PUSH_TOKEN" ]; then
            echo "⚠️ BACKEND_PUSH_TOKEN not set, skipping backend notification"
            exit 0
          fi
          for HOST in "https://api.waselak.online" "https://debug.waselak.online"; do
            echo "→ Notifying $HOST"
            CODE=$(curl -s -o /tmp/notify.json -w "%{http_code}" -m 15 \
              -X POST "$HOST/api/v1/app/release-published" \
              -H "X-Push-Token: $BACKEND_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"version\":\"$VERSION\"}" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "   ✓ $HOST: $(cat /tmp/notify.json)"
            else
              echo "   ⚠️ $HOST: HTTP $CODE — $(cat /tmp/notify.json 2>/dev/null | head -c 200)"
            fi
          done

      # ── Send to Telegram ────────────────────────────────────────────────
      - name: Send files to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.vars.outputs.version }}
          DATE: ${{ steps.vars.outputs.date }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️ Telegram secrets not set, skipping notification"
            exit 0
          fi

          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          # ── Start message ──
          curl -s -X POST "${API}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=$(cat <<MSG
          📦 <b>Waselak v${VERSION} — New Release</b>

          📅 Date: ${DATE}
          🏷️ Tag: ${TAG}
          🔗 <a href="${RELEASE_URL}">View on GitHub</a>

          ⏳ Uploading files...
          MSG
          )" > /dev/null

          echo "✅ Start message sent"

          # ── Helper function ──
          send_msg() {
            curl -s -X POST "${API}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$1" > /dev/null
          }

          send_file() {
            local file="$1"
            local caption="$2"
            local filesize
            filesize=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
            local mb=$((filesize / 1024 / 1024))

            if [ "$filesize" -gt 52428800 ]; then
              # File > 50MB — Telegram rejects, send as link instead
              local filename
              filename=$(basename "$file")
              local github_url="https://github.com/${REPO}/releases/download/${TAG}/${filename}"
              send_msg "${caption}
          📦 ${mb} MB — <a href=\"${github_url}\">⬇️ Download from GitHub</a>"
              echo "    (${mb}MB > 50MB limit — sent as link)"
            else
              local result
              result=$(curl -s -X POST "${API}/sendDocument" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "document=@${file}" \
                -F "caption=${caption}" \
                -F "parse_mode=HTML")
              if echo "$result" | grep -q '"ok":true'; then
                echo "    (sent as file)"
              else
                # Upload failed — send as link
                local filename
                filename=$(basename "$file")
                local github_url="https://github.com/${REPO}/releases/download/${TAG}/${filename}"
                send_msg "${caption}
          📦 ${mb} MB — <a href=\"${github_url}\">⬇️ Download from GitHub</a>"
                echo "    (upload failed — sent as link)"
              fi
            fi
          }

          # ── Debug APKs section ──
          send_msg "🐛 <b>Debug Builds (Android)</b>"
          sleep 1

          for FILE in all-artifacts/debug/*.apk; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              APP=$(echo "$FILENAME" | cut -d'-' -f1)
              GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
              echo "  Sending: $FILENAME"
              CAPTION="🐛 <b>${APP^} - Debug</b>
          📄 ${FILENAME}
          📥 <a href=\"${GITHUB_URL}\">GitHub Download</a>"
              send_file "$FILE" "$CAPTION"
              echo "  ✅ $FILENAME"
              sleep 3
            fi
          done

          # ── Release APKs section ──
          send_msg "✅ <b>Release Builds (Android - Signed)</b>"
          sleep 1

          for FILE in all-artifacts/release/*.apk; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              APP=$(echo "$FILENAME" | cut -d'-' -f1)
              GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
              echo "  Sending: $FILENAME"
              CAPTION="✅ <b>${APP^} - Release</b>
          📄 ${FILENAME}
          📥 <a href=\"${GITHUB_URL}\">GitHub Download</a>"
              send_file "$FILE" "$CAPTION"
              echo "  ✅ $FILENAME"
              sleep 3
            fi
          done

          # ── Desktop packages (debug + release per platform) ──
          for PLATFORM_NAME in linux macos windows; do
            case "$PLATFORM_NAME" in
              linux)  EXT="deb"; ICON="🐧"; LABEL="Linux (.deb)" ;;
              macos)  EXT="dmg"; ICON="🍎"; LABEL="macOS (.dmg)" ;;
              windows) EXT="msi"; ICON="🪟"; LABEL="Windows (.msi)" ;;
            esac

            # Debug desktop
            DEBUG_TEXT="🐛 ${ICON} <b>Desktop Debug - ${LABEL}</b>"
            HAS_DEBUG=false
            for FILE in all-artifacts/debug/*-debug-${PLATFORM_NAME}.${EXT}; do
              if [ -f "$FILE" ]; then
                FILENAME=$(basename "$FILE")
                APP=$(echo "$FILENAME" | cut -d'-' -f1)
                GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
                FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
                MB=$((FILESIZE / 1024 / 1024))
                DEBUG_TEXT="${DEBUG_TEXT}
          📎 <b>${APP^}</b> — ${MB} MB
              <a href=\"${GITHUB_URL}\">⬇️ Download</a>"
                HAS_DEBUG=true
              fi
            done
            if [ "$HAS_DEBUG" = true ]; then
              send_msg "$DEBUG_TEXT"
              sleep 1
            fi

            # Release desktop
            RELEASE_TEXT="✅ ${ICON} <b>Desktop Release - ${LABEL}</b>"
            HAS_RELEASE=false
            for FILE in all-artifacts/release/*-release-${PLATFORM_NAME}.${EXT}; do
              if [ -f "$FILE" ]; then
                FILENAME=$(basename "$FILE")
                APP=$(echo "$FILENAME" | cut -d'-' -f1)
                GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
                FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
                MB=$((FILESIZE / 1024 / 1024))
                RELEASE_TEXT="${RELEASE_TEXT}
          📎 <b>${APP^}</b> — ${MB} MB
              <a href=\"${GITHUB_URL}\">⬇️ Download</a>"
                HAS_RELEASE=true
              fi
            done
            if [ "$HAS_RELEASE" = true ]; then
              send_msg "$RELEASE_TEXT"
              sleep 1
            fi
          done

          # ── End message ──
          send_msg "✅ <b>All files for Waselak v${VERSION} uploaded!</b>

          🔗 <a href=\"${RELEASE_URL}\">View Full Release on GitHub</a>

          📅 ${DATE}  •  🏷️ ${TAG}

          — Waselak CI/CD 🤖"

          echo "✅ All Telegram messages sent"

      # ── Deploy Backend to VPS ────────────────────────────────────────
      - name: Deploy backend to VPS
        env:
          VPS_DEPLOY_TOKEN: ${{ secrets.VPS_DEPLOY_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$VPS_DEPLOY_TOKEN" ]; then
            echo "⚠️ VPS_DEPLOY_TOKEN not set, skipping deploy"
            exit 0
          fi
          echo "🚀 Deploying backend $TAG to VPS..."
          # First check if VPS is reachable (quick 10s probe)
          if ! curl -s -o /dev/null -m 10 -w "%{http_code}" "http://187.124.47.222:9090/" > /dev/null 2>&1; then
            echo "⚠️ VPS deploy service unreachable on port 9090 — check if the service is running"
            echo "  ssh into VPS and run: ss -tlnp | grep 9090"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" -m 300 \
            "http://187.124.47.222:9090/deploy?tag=${TAG}&token=${VPS_DEPLOY_TOKEN}")
          RESULT=$(cat /tmp/deploy_response.txt)
          echo "VPS HTTP $HTTP_CODE — Response: $RESULT"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌ Connection timed out or refused — VPS deploy service may be down"
            exit 1
          elif echo "$RESULT" | grep -q "success"; then
            echo "✅ Backend deployed to VPS!"
          else
            echo "⚠️ Deploy may have failed (HTTP $HTTP_CODE) — check VPS manually"
          fi

