# =============================================================================
# Waselak CI/CD Pipeline
# =============================================================================
# 1. Lint      — Android lint on all 5 apps
# 2. Test      — Backend (48) + KMP (28+) unit tests
# 3. Android   — Debug + Release APKs for manager, cashier, delivery, kds, admin
# 4. Desktop   — Linux .deb, macOS .dmg, Windows .msi (matrix)
# 5. Upload    — All artifacts → Google Drive under v{VERSION}/debug|release/
#
# Naming: {app}-v{version}-{DDMMYY}-{debug|release}-{platform}.{ext}
# Example: manager-v1.0.0-110326-release-android.apk
# =============================================================================

name: Waselak CI/CD

on:
  push:
    tags: ['v*']
#  pull_request:
#    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Skip Google Drive upload"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.parallel=true"

# =============================================================================
# JOB 1: LINT
# =============================================================================
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run Android Lint
        run: |
          ./gradlew :app-manager:lintDebug \
                    :app-cashier:lintDebug \
                    :app-delivery:lintDebug \
                    :app-kds:lintDebug \
                    :app-admin:lintDebug \
                    --continue

      - name: Upload lint reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app-manager/build/reports/lint-results-debug.html
            app-cashier/build/reports/lint-results-debug.html
            app-delivery/build/reports/lint-results-debug.html
            app-kds/build/reports/lint-results-debug.html
            app-admin/build/reports/lint-results-debug.html
          retention-days: 3

  # ===========================================================================
  # JOB 2: TEST
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run backend tests
        run: ./gradlew :backend:test

      - name: Run KMP unit tests
        run: |
          ./gradlew :core:core-model:desktopTest \
                    :feature:feature-manager-orders:desktopTest \
                    --continue

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/build/reports/tests/
            core/core-model/build/reports/tests/
            feature/feature-manager-orders/build/reports/tests/
          retention-days: 3

  # ===========================================================================
  # JOB 3: BUILD ANDROID (debug + release APKs)
  # ===========================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Reconstruct release secrets from GitHub Secrets ──────────────────
      - name: Create env/release.properties
        run: |
          cat > env/release.properties << EOF
          BASE_URL=${{ secrets.RELEASE_BASE_URL }}
          HMAC_SECRET=${{ secrets.RELEASE_HMAC_SECRET }}
          SENTRY_DSN=${{ secrets.RELEASE_SENTRY_DSN }}
          EOF

      # ── Build APKs ──────────────────────────────────────────────────────
      # Keystore is handled by Gradle: it reads KEYSTORE_BASE64 env var,
      # decodes it to a .jks file, and configures signing automatically.
      - name: Build all debug APKs
        run: ./gradlew assembleAllDebug

      - name: Build all release APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleAllRelease

      # ── Compute naming variables ────────────────────────────────────────
      - name: Compute version and date
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Rename and organize APKs ────────────────────────────────────────
      - name: Rename APKs to naming convention
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          mkdir -p artifacts/debug artifacts/release

          for module in app-manager app-cashier app-delivery app-kds app-admin; do
            name="${module#app-}"

            # Debug APK
            DEBUG_APK=$(find "$module/build/outputs/apk/debug" \
                             -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" \
                 "artifacts/debug/${name}-v${VERSION}-${DATE}-debug-android.apk"
              echo "OK: ${name} debug APK"
            else
              echo "WARNING: No debug APK found for $module"
            fi

            # Release APK
            RELEASE_APK=$(find "$module/build/outputs/apk/release" \
                               -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$RELEASE_APK" ]; then
              cp "$RELEASE_APK" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-android.apk"
              echo "OK: ${name} release APK"
            else
              echo "WARNING: No release APK found for $module"
            fi
          done

          echo "=== Debug artifacts ==="
          ls -la artifacts/debug/
          echo "=== Release artifacts ==="
          ls -la artifacts/release/ 2>/dev/null || echo "(none)"

      # ── Upload as GitHub artifacts ──────────────────────────────────────
      - name: Upload debug APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: artifacts/debug/
          retention-days: 3

      - name: Upload release APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 4: BUILD DESKTOP (matrix: Linux, macOS, Windows)
  # ===========================================================================
  build-desktop:
    name: Build Desktop (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            task: packageAllDesktopDeb
            gradle-args: ""
            platform: linux
            ext: deb

          - os: macos-latest
            os-label: macOS
            task: packageAllDesktopDmg
            gradle-args: ""
            platform: macos
            ext: dmg

          - os: windows-latest
            os-label: Windows
            task: packageAllDesktopMsi
            gradle-args: -PtargetOs=windows
            platform: windows
            ext: msi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Desktop packaging tasks auto-detect as release via
      # KmpApplicationConventionPlugin.resolveBuildEnv()
      - name: Create env/release.properties
        shell: bash
        run: |
          cat > env/release.properties << EOF
          BASE_URL=${{ secrets.RELEASE_BASE_URL }}
          HMAC_SECRET=${{ secrets.RELEASE_HMAC_SECRET }}
          SENTRY_DSN=${{ secrets.RELEASE_SENTRY_DSN }}
          EOF

      - name: Build desktop packages
        run: ./gradlew ${{ matrix.task }} ${{ matrix.gradle-args }}

      - name: Compute version and date
        id: vars
        shell: bash
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Rename desktop packages
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          PLATFORM="${{ matrix.platform }}"
          EXT="${{ matrix.ext }}"
          mkdir -p artifacts/release

          for module in app-manager app-cashier app-delivery app-kds; do
            name="${module#app-}"

            # Find the built package file
            PKG=$(find "$module/build/compose/binaries/main/$EXT" \
                       -name "*.$EXT" -type f 2>/dev/null | head -1)

            if [ -n "$PKG" ]; then
              cp "$PKG" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
              echo "OK: ${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
            else
              echo "WARNING: No .$EXT found for $module"
            fi
          done

          echo "=== Desktop artifacts ($PLATFORM) ==="
          ls -la artifacts/release/

      - name: Upload desktop artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 5: UPLOAD TO GOOGLE DRIVE
  # ===========================================================================
  upload-to-dropbox:
    name: Upload to Dropbox
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event.inputs.skip_upload != 'true')
    timeout-minutes: 90

    steps:
      - name: Checkout (for gradle.properties)
        uses: actions/checkout@v4
        with:
          sparse-checkout: gradle.properties

      # ── Download all artifacts ──────────────────────────────────────────
      - name: Download Android debug
        uses: actions/download-artifact@v4
        with:
          name: android-debug
          path: all-artifacts/debug/

      - name: Download Android release
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: all-artifacts/release/

      - name: Download Linux desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-linux
          path: all-artifacts/release/

      - name: Download macOS desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-macos
          path: all-artifacts/release/

      - name: Download Windows desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-windows
          path: all-artifacts/release/

      - name: Show all artifacts
        run: |
          echo "=== Debug ==="
          ls -la all-artifacts/debug/
          echo "=== Release ==="
          ls -la all-artifacts/release/

      # ── Read version ────────────────────────────────────────────────────
      - name: Read version
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Upload to Dropbox ──────────────────────────────────────────────
      - name: Upload artifacts to Dropbox
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          APP_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.parse, urllib.error, sys, glob, time

          APP_KEY = os.environ["DROPBOX_APP_KEY"]
          APP_SECRET = os.environ["DROPBOX_APP_SECRET"]
          REFRESH_TOKEN = os.environ["DROPBOX_REFRESH_TOKEN"]
          VERSION = os.environ["APP_VERSION"]
          BASE = f"/waselak-builds/v{VERSION}"
          CHUNK = 50 * 1024 * 1024  # 50MB

          def get_fresh_token():
              """Get a fresh access token using refresh token."""
              data = urllib.parse.urlencode({
                  "grant_type": "refresh_token",
                  "refresh_token": REFRESH_TOKEN,
                  "client_id": APP_KEY,
                  "client_secret": APP_SECRET,
              }).encode()
              req = urllib.request.Request("https://api.dropboxapi.com/oauth2/token", data=data)
              resp = urllib.request.urlopen(req)
              token = json.loads(resp.read())["access_token"]
              print("🔑 Fresh token obtained")
              return token

          def create_folder(token, path):
              """Create folder, ignore if exists."""
              try:
                  req = urllib.request.Request(
                      "https://api.dropboxapi.com/2/files/create_folder_v2",
                      data=json.dumps({"path": path, "autorename": False}).encode(),
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                  )
                  urllib.request.urlopen(req)
                  print(f"  📁 Created: {path}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  if "conflict" in body or e.code == 409:
                      print(f"  📁 Exists: {path}")
                  else:
                      print(f"  ⚠️ Folder error ({e.code}): {body[:200]}")

          def upload_small(token, filepath, dropbox_path):
              """Upload file <= 150MB."""
              with open(filepath, "rb") as f:
                  data = f.read()
              req = urllib.request.Request(
                  "https://content.dropboxapi.com/2/files/upload",
                  data=data,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Dropbox-API-Arg": json.dumps({"path": dropbox_path, "mode": "overwrite"}),
                      "Content-Type": "application/octet-stream",
                  },
              )
              urllib.request.urlopen(req)

          def upload_large(token, filepath, dropbox_path, filesize):
              """Upload file > 150MB using upload sessions."""
              # Start session
              req = urllib.request.Request(
                  "https://content.dropboxapi.com/2/files/upload_session/start",
                  data=b"",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Dropbox-API-Arg": json.dumps({"close": False}),
                      "Content-Type": "application/octet-stream",
                  },
              )
              resp = urllib.request.urlopen(req)
              session_id = json.loads(resp.read())["session_id"]

              with open(filepath, "rb") as f:
                  offset = 0
                  while offset < filesize:
                      chunk = f.read(CHUNK)
                      if not chunk:
                          break
                      for attempt in range(3):
                          try:
                              req = urllib.request.Request(
                                  "https://content.dropboxapi.com/2/files/upload_session/append_v2",
                                  data=chunk,
                                  headers={
                                      "Authorization": f"Bearer {token}",
                                      "Dropbox-API-Arg": json.dumps({
                                          "cursor": {"session_id": session_id, "offset": offset},
                                          "close": False,
                                      }),
                                      "Content-Type": "application/octet-stream",
                                  },
                              )
                              urllib.request.urlopen(req)
                              break
                          except urllib.error.HTTPError as e:
                              if attempt < 2:
                                  print(f"    ⚠️ Retry chunk at {offset} (attempt {attempt+2}/3)")
                                  time.sleep(2)
                                  if e.code == 401:
                                      token = get_fresh_token()
                              else:
                                  raise
                      offset += len(chunk)
                      pct = int(offset * 100 / filesize)
                      print(f"    {pct}% ({offset // 1024 // 1024}MB / {filesize // 1024 // 1024}MB)")

              # Finish
              req = urllib.request.Request(
                  "https://content.dropboxapi.com/2/files/upload_session/finish",
                  data=b"",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Dropbox-API-Arg": json.dumps({
                          "cursor": {"session_id": session_id, "offset": filesize},
                          "commit": {"path": dropbox_path, "mode": "overwrite"},
                      }),
                      "Content-Type": "application/octet-stream",
                  },
              )
              urllib.request.urlopen(req)
              return token

          def upload_file(token, filepath, dropbox_path):
              filename = os.path.basename(filepath)
              filesize = os.path.getsize(filepath)
              mb = filesize / 1024 / 1024
              print(f"  📤 {filename} ({mb:.1f} MB)...")
              try:
                  if filesize <= 150_000_000:
                      upload_small(token, filepath, dropbox_path)
                  else:
                      token = upload_large(token, filepath, dropbox_path, filesize)
                  print(f"  ✅ {filename}")
              except Exception as e:
                  print(f"  ❌ {filename} - {e}")
              return token

          # === Main ===
          token = get_fresh_token()

          print("=== Creating folders ===")
          create_folder(token, BASE)
          create_folder(token, f"{BASE}/debug")
          create_folder(token, f"{BASE}/release")

          debug_files = sorted(glob.glob("all-artifacts/debug/*"))
          if debug_files:
              print(f"\n=== Uploading {len(debug_files)} debug artifacts ===")
              for f in debug_files:
                  token = upload_file(token, f, f"{BASE}/debug/{os.path.basename(f)}")

          release_files = sorted(glob.glob("all-artifacts/release/*"))
          if release_files:
              print(f"\n=== Uploading {len(release_files)} release artifacts ===")
              for f in release_files:
                  token = upload_file(token, f, f"{BASE}/release/{os.path.basename(f)}")

          total = len(debug_files) + len(release_files)
          print(f"\n=== ✅ {total} files uploaded to Dropbox at {BASE} ===")
          PYEOF

