# =============================================================================
# Waselak CI/CD Pipeline
# =============================================================================
# 1. Lint      — Android lint on all 5 apps
# 2. Test      — Backend (48) + KMP (28+) unit tests
# 3. Android   — Debug + Release APKs for manager, cashier, delivery, kds, admin
# 4. Desktop   — Linux .deb, macOS .dmg, Windows .msi (matrix)
# 5. Release   — GitHub Release + Telegram notification
#
# Naming: {app}-v{version}-{DDMMYY}-{debug|release}-{platform}.{ext}
# Example: manager-v1.0.0-110326-release-android.apk
# =============================================================================

name: Waselak CI/CD

on:
  push:
    tags: ['v*']
#  pull_request:
#    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Skip GitHub Release + Telegram"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.parallel=true"

# =============================================================================
# JOB 1: LINT
# =============================================================================
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run Android Lint
        run: |
          ./gradlew :app-manager:lintDebug \
                    :app-cashier:lintDebug \
                    :app-delivery:lintDebug \
                    :app-kds:lintDebug \
                    :app-admin:lintDebug \
                    --continue

      - name: Upload lint reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app-manager/build/reports/lint-results-debug.html
            app-cashier/build/reports/lint-results-debug.html
            app-delivery/build/reports/lint-results-debug.html
            app-kds/build/reports/lint-results-debug.html
            app-admin/build/reports/lint-results-debug.html
          retention-days: 3

  # ===========================================================================
  # JOB 2: TEST
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Create stub env/release.properties
        run: cp env/release.properties.template env/release.properties

      - name: Run backend tests
        run: ./gradlew :backend:test

      - name: Run KMP unit tests
        run: |
          ./gradlew :core:core-model:desktopTest \
                    :feature:feature-manager-orders:desktopTest \
                    --continue

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/build/reports/tests/
            core/core-model/build/reports/tests/
            feature/feature-manager-orders/build/reports/tests/
          retention-days: 3

  # ===========================================================================
  # JOB 3: BUILD ANDROID (debug + release APKs)
  # ===========================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # ── Reconstruct release secrets from GitHub Secrets ──────────────────
      - name: Create env/release.properties
        run: |
          cat > env/release.properties << EOF
          BASE_URL=${{ secrets.RELEASE_BASE_URL }}
          HMAC_SECRET=${{ secrets.RELEASE_HMAC_SECRET }}
          SENTRY_DSN=${{ secrets.RELEASE_SENTRY_DSN }}
          EOF

      # ── Build APKs ──────────────────────────────────────────────────────
      # Keystore is handled by Gradle: it reads KEYSTORE_BASE64 env var,
      # decodes it to a .jks file, and configures signing automatically.
      - name: Build all debug APKs
        run: ./gradlew assembleAllDebug

      - name: Build all release APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleAllRelease

      # ── Compute naming variables ────────────────────────────────────────
      - name: Compute version and date
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Rename and organize APKs ────────────────────────────────────────
      - name: Rename APKs to naming convention
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          mkdir -p artifacts/debug artifacts/release

          for module in app-manager app-cashier app-delivery app-kds app-admin; do
            name="${module#app-}"

            # Debug APK
            DEBUG_APK=$(find "$module/build/outputs/apk/debug" \
                             -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" \
                 "artifacts/debug/${name}-v${VERSION}-${DATE}-debug-android.apk"
              echo "OK: ${name} debug APK"
            else
              echo "WARNING: No debug APK found for $module"
            fi

            # Release APK
            RELEASE_APK=$(find "$module/build/outputs/apk/release" \
                               -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$RELEASE_APK" ]; then
              cp "$RELEASE_APK" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-android.apk"
              echo "OK: ${name} release APK"
            else
              echo "WARNING: No release APK found for $module"
            fi
          done

          echo "=== Debug artifacts ==="
          ls -la artifacts/debug/
          echo "=== Release artifacts ==="
          ls -la artifacts/release/ 2>/dev/null || echo "(none)"

      # ── Upload as GitHub artifacts ──────────────────────────────────────
      - name: Upload debug APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: artifacts/debug/
          retention-days: 3

      - name: Upload release APKs
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 4: BUILD DESKTOP (matrix: Linux, macOS, Windows)
  # ===========================================================================
  build-desktop:
    name: Build Desktop (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            task: packageAllDesktopDeb
            gradle-args: ""
            platform: linux
            ext: deb
            java-version: "21"

          - os: macos-14
            os-label: macOS (ARM64)
            task: packageAllDesktopDmg
            gradle-args: ""
            platform: macos
            ext: dmg
            java-version: "21"

          - os: windows-latest
            os-label: Windows
            task: packageAllDesktopMsi
            gradle-args: ""
            platform: windows
            ext: msi
            java-version: "21"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version || env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # Desktop packaging tasks auto-detect as release via
      # KmpApplicationConventionPlugin.resolveBuildEnv()
      - name: Create env/release.properties
        shell: bash
        run: |
          cat > env/release.properties << EOF
          BASE_URL=${{ secrets.RELEASE_BASE_URL }}
          HMAC_SECRET=${{ secrets.RELEASE_HMAC_SECRET }}
          SENTRY_DSN=${{ secrets.RELEASE_SENTRY_DSN }}
          EOF

      - name: Build desktop packages
        shell: bash
        run: ./gradlew ${{ matrix.task }} ${{ matrix.gradle-args }}

      - name: Compute version and date
        id: vars
        shell: bash
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          DATE=$(date +'%d%m%y')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Rename desktop packages
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          DATE="${{ steps.vars.outputs.date }}"
          PLATFORM="${{ matrix.platform }}"
          EXT="${{ matrix.ext }}"
          mkdir -p artifacts/release

          for module in app-manager app-cashier app-delivery app-kds; do
            name="${module#app-}"

            # Find the built package file
            PKG=$(find "$module/build/compose/binaries/main/$EXT" \
                       -name "*.$EXT" -type f 2>/dev/null | head -1)

            if [ -n "$PKG" ]; then
              cp "$PKG" \
                 "artifacts/release/${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
              echo "OK: ${name}-v${VERSION}-${DATE}-release-${PLATFORM}.${EXT}"
            else
              echo "WARNING: No .$EXT found for $module"
            fi
          done

          echo "=== Desktop artifacts ($PLATFORM) ==="
          ls -la artifacts/release/

      - name: Upload desktop artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}
          path: artifacts/release/
          retention-days: 3

  # ===========================================================================
  # JOB 5: UPLOAD TO GOOGLE DRIVE
  # ===========================================================================
  # upload-to-dropbox: (disabled — replaced by GitHub Releases + Telegram)
  #   To re-enable, uncomment this block and comment out the release job below.

  release-and-notify:
    name: GitHub Release + Telegram
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event.inputs.skip_upload != 'true')
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout (for gradle.properties)
        uses: actions/checkout@v4
        with:
          sparse-checkout: gradle.properties

      # ── Download all artifacts ──────────────────────────────────────────
      - name: Download Android debug
        uses: actions/download-artifact@v4
        with:
          name: android-debug
          path: all-artifacts/debug/

      - name: Download Android release
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: all-artifacts/release/

      - name: Download Linux desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-linux
          path: all-artifacts/release/

      - name: Download macOS desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-macos
          path: all-artifacts/release/

      - name: Download Windows desktop
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-windows
          path: all-artifacts/release/

      - name: Show all artifacts
        run: |
          echo "=== Debug ==="
          ls -lh all-artifacts/debug/
          echo "=== Release ==="
          ls -lh all-artifacts/release/

      # ── Read version ────────────────────────────────────────────────────
      - name: Read version
        id: vars
        run: |
          VERSION=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          DATE=$(date -u '+%Y-%m-%d')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create release with all files
          gh release create "$TAG" \
            --title "🚀 Waselak v${VERSION}" \
            --notes "$(cat <<'NOTES'
          ## Waselak v${VERSION}

          ### 🤖 Android APKs
          **Debug:** manager, cashier, delivery, kds, admin
          **Release:** manager, cashier, delivery, kds, admin (signed)

          ### 🖥️ Desktop Packages
          **Linux:** .deb packages
          **macOS:** .dmg packages
          **Windows:** .msi installers

          ---
          Built automatically by CI/CD
          NOTES
          )" \
            --latest \
            all-artifacts/debug/* \
            all-artifacts/release/*

          echo "✅ GitHub Release created: $TAG"

      # ── Send to Telegram ────────────────────────────────────────────────
      - name: Send files to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.vars.outputs.version }}
          DATE: ${{ steps.vars.outputs.date }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️ Telegram secrets not set, skipping notification"
            exit 0
          fi

          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          # ── Start message ──
          curl -s -X POST "${API}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=$(cat <<MSG
          📦 <b>Waselak v${VERSION} — New Release</b>

          📅 Date: ${DATE}
          🏷️ Tag: ${TAG}
          🔗 <a href="${RELEASE_URL}">View on GitHub</a>

          ⏳ Uploading files...
          MSG
          )" > /dev/null

          echo "✅ Start message sent"

          # ── Helper function ──
          send_msg() {
            curl -s -X POST "${API}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=$1" > /dev/null
          }

          send_file() {
            local file="$1"
            local caption="$2"
            curl -s -X POST "${API}/sendDocument" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "document=@${file}" \
              -F "caption=${caption}" \
              -F "parse_mode=HTML" > /dev/null
          }

          # ── Debug APKs section ──
          send_msg "🐛 <b>Debug Builds (Android)</b>"
          sleep 1

          for FILE in all-artifacts/debug/*.apk; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              APP=$(echo "$FILENAME" | cut -d'-' -f1)
              GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
              echo "  Sending: $FILENAME"
              CAPTION="🐛 <b>${APP^} - Debug</b>
          📄 ${FILENAME}
          📥 <a href=\"${GITHUB_URL}\">GitHub Download</a>"
              send_file "$FILE" "$CAPTION"
              echo "  ✅ $FILENAME"
              sleep 3
            fi
          done

          # ── Release APKs section ──
          send_msg "✅ <b>Release Builds (Android - Signed)</b>"
          sleep 1

          for FILE in all-artifacts/release/*.apk; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              APP=$(echo "$FILENAME" | cut -d'-' -f1)
              GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
              echo "  Sending: $FILENAME"
              CAPTION="✅ <b>${APP^} - Release</b>
          📄 ${FILENAME}
          📥 <a href=\"${GITHUB_URL}\">GitHub Download</a>"
              send_file "$FILE" "$CAPTION"
              echo "  ✅ $FILENAME"
              sleep 3
            fi
          done

          # ── Desktop packages (per platform) ──
          for PLATFORM_NAME in linux macos windows; do
            case "$PLATFORM_NAME" in
              linux)  EXT="deb"; ICON="🐧"; LABEL="Linux (.deb)" ;;
              macos)  EXT="dmg"; ICON="🍎"; LABEL="macOS (.dmg)" ;;
              windows) EXT="msi"; ICON="🪟"; LABEL="Windows (.msi)" ;;
            esac

            DESKTOP_TEXT="${ICON} <b>Desktop - ${LABEL}</b>"
            HAS_FILES=false
            for FILE in all-artifacts/release/*.${EXT}; do
              if [ -f "$FILE" ]; then
                FILENAME=$(basename "$FILE")
                APP=$(echo "$FILENAME" | cut -d'-' -f1)
                GITHUB_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
                FILESIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
                MB=$((FILESIZE / 1024 / 1024))
                DESKTOP_TEXT="${DESKTOP_TEXT}
          📎 <b>${APP^}</b> — ${MB} MB
              <a href=\"${GITHUB_URL}\">⬇️ Download ${FILENAME}</a>"
                HAS_FILES=true
              fi
            done

            if [ "$HAS_FILES" = true ]; then
              send_msg "$DESKTOP_TEXT"
              sleep 1
            fi
          done

          # ── End message ──
          send_msg "✅ <b>All files for Waselak v${VERSION} uploaded!</b>

          🔗 <a href=\"${RELEASE_URL}\">View Full Release on GitHub</a>

          📅 ${DATE}  •  🏷️ ${TAG}

          — Waselak CI/CD 🤖"

          echo "✅ All Telegram messages sent"

      # ── Dropbox Upload (DISABLED) ──────────────────────────────────────
