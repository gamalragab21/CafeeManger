name: KDS Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build KDS Windows MSI
        run: ./gradlew :app-kds:packageMsi -PtargetOs=windows

      - name: Build KDS Windows Uber JAR
        run: ./gradlew :app-kds:packageUberJarForCurrentOS -PtargetOs=windows

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: Waselak-KDS-Windows-Installer
          path: app-kds/build/compose/binaries/main/msi/*.msi

      - name: Upload Uber JAR
        uses: actions/upload-artifact@v4
        with:
          name: Waselak-KDS-Windows-JAR
          path: app-kds/build/compose/jars/*.jar
