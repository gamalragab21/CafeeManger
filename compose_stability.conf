// Stability configuration for the Compose compiler.
// Classes listed here are treated as stable, so Compose can skip recomposition
// when their equals() returns true. Safe because these are @Serializable data
// classes with val-only fields (see core/core-model).

// All domain models
net.marllex.waselak.core.model.*

// Kotlin/KMP stdlib types that are stable-by-contract
kotlinx.datetime.*
kotlinx.collections.immutable.*

// Kotlin stdlib immutable types used as field types in state
kotlin.time.Duration
